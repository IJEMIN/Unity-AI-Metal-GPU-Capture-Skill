<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 600" font-family="-apple-system, Helvetica, Arial, sans-serif">
  <rect width="720" height="600" fill="#383838"/>
  <!-- title -->
  <text x="16" y="30" fill="#e6e6e6" font-size="16" font-weight="700">Metal GPU Capture</text>
  <!-- tab bar -->
  <g font-size="12">
    <rect x="16"  y="44" width="166" height="24" rx="3" fill="#4a4a4a"/>
    <text x="99"  y="60" fill="#ffffff" text-anchor="middle" font-weight="700">Summary</text>
    <rect x="186" y="44" width="166" height="24" rx="3" fill="#333333"/>
    <text x="269" y="60" fill="#b0b0b0" text-anchor="middle">Capture</text>
    <rect x="356" y="44" width="166" height="24" rx="3" fill="#333333"/>
    <text x="439" y="60" fill="#b0b0b0" text-anchor="middle">Details</text>
    <rect x="526" y="44" width="178" height="24" rx="3" fill="#333333"/>
    <text x="615" y="60" fill="#b0b0b0" text-anchor="middle">Log</text>
  </g>
  <!-- status -->
  <text x="16" y="90" fill="#7fc77f" font-size="12" font-weight="700">Inspection complete.</text>
  <text x="16" y="116" fill="#e0e0e0" font-size="13" font-weight="700">Summary</text>

  <!-- KVs -->
  <g font-size="12" fill="#d2d2d2">
    <text x="16" y="138"><tspan font-weight="700">Device:</tspan>  Apple M3 Pro</text>
    <text x="16" y="156"><tspan font-weight="700">Encoders / draws:</tspan>  109 / 2148</text>
    <text x="16" y="174"><tspan font-weight="700">GPU frame time:</tspan>  31.10 ms</text>
  </g>

  <!-- budget gauge -->
  <text x="16" y="200" fill="#e0e0e0" font-size="12" font-weight="700">Frame budget @ 60 fps = 16.67 ms</text>
  <rect x="16" y="208" width="688" height="16" rx="2" fill="#ffffff14"/>
  <rect x="16" y="208" width="688" height="16" rx="2" fill="#d9734d"/>
  <text x="16" y="240" fill="#e69a4d" font-size="12">OVER budget by 14.43 ms (≈ 32 fps now). Cut 14.43 ms to hit 60 fps.</text>
  <text x="16" y="262" fill="#d2d2d2" font-size="12"><tspan font-weight="700">Top pass bottleneck:</tspan>  Fragment-shader-launch bound</text>

  <!-- insights -->
  <text x="16" y="292" fill="#e0e0e0" font-size="13" font-weight="700">Top 3 optimization insights</text>

  <!-- card 1 -->
  <rect x="16" y="300" width="688" height="74" rx="4" fill="#ffffff0d"/>
  <text x="26" y="320" fill="#ffffff" font-size="12" font-weight="700">1. TAA + motion vectors  [quick win]</text>
  <text x="26" y="338" fill="#b8b8b8" font-size="11">Evidence: TAA = 3.20 ms, motion vectors = 7.72 ms (35% together)</text>
  <text x="26" y="360" fill="#d2d2d2" font-size="11">Fix: on low-end tiers switch anti-aliasing to FXAA — also removes the motion-vector pass cost.</text>

  <!-- card 2 -->
  <rect x="16" y="380" width="688" height="74" rx="4" fill="#ffffff0d"/>
  <text x="26" y="400" fill="#ffffff" font-size="12" font-weight="700">2. Opaque/transparent geometry</text>
  <text x="26" y="418" fill="#b8b8b8" font-size="11">Evidence: Geometry = 9.52 ms (31%) over 2148 draws this frame</text>
  <text x="26" y="440" fill="#d2d2d2" font-size="11">Fix: improve batching (SRP Batcher / GPU instancing / atlases), cull aggressively, use LODs.</text>

  <!-- card 3 -->
  <rect x="16" y="460" width="688" height="74" rx="4" fill="#ffffff0d"/>
  <text x="26" y="480" fill="#ffffff" font-size="12" font-weight="700">3. SSAO  [quick win]</text>
  <text x="26" y="498" fill="#b8b8b8" font-size="11">Evidence: SSAO = 2.29 ms (7%)</text>
  <text x="26" y="520" fill="#d2d2d2" font-size="11">Fix: reduce SSAO sample count, increase downsample, lower blur quality, or disable on low tiers.</text>

  <text x="16" y="558" fill="#7a7a7a" font-size="10">Representative mockup of the Summary tab (real data from an Apple M3 Pro URP capture). Replace with a real screenshot.</text>
</svg>
